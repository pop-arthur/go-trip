services:
  app:
    image: gotrip-backend:0.1.0-SNAPSHOT
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GOTRIP_DB_URL: jdbc:postgresql://postgres:5432/gotrip
      GOTRIP_DB_HOST: postgres
      GOTRIP_DB_PORT: 5432
      GOTRIP_DB_NAME: gotrip
      GOTRIP_DB_USER: gotrip_user
      GOTRIP_DB_PASSWORD: ${GOTRIP_DB_PASSWORD:?GOTRIP_DB_PASSWORD is required}
      GOTRIP_SERVER_HOST: 0.0.0.0
      GOTRIP_SERVER_PORT: 8080
    ports:
      - "8080:8080"

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: gotrip
      POSTGRES_USER: gotrip_user
      POSTGRES_PASSWORD: ${GOTRIP_DB_PASSWORD:?GOTRIP_DB_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gotrip_user -d gotrip"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html
    ports:
      - "8081:80"
    depends_on:
      - app

volumes:
  postgres-data:
