<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTrip — управление поездками</title>
    <style>
        /* ========== RESET ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0a12;
            color: #f0eef7;
            min-height: 100vh;
            display: flex;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 260px;
            background: #13101f;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2440;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        .sidebar .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }

        .sidebar .user-info {
            margin-bottom: 24px;
            padding: 12px;
            background: #1e1a2e;
            border-radius: 12px;
            font-size: 14px;
            color: #c4bcdb;
            border: 1px solid #2a2440;
        }

        .sidebar .user-info .email {
            font-weight: 600;
            color: #f0eef7;
        }

        .sidebar .user-info .roles {
            font-size: 12px;
            color: #8b7ab8;
            margin-top: 4px;
        }

        .sidebar nav {
            flex: 1;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            margin: 4px 0;
            border-radius: 10px;
            color: #b8b0d0;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .sidebar nav a:hover {
            background: #1e1a2e;
            color: #f0eef7;
        }

        .sidebar nav a.active {
            background: #2d2550;
            color: #c4b0ff;
            box-shadow: 0 0 12px rgba(139, 92, 246, 0.15);
        }

        .sidebar nav a .icon {
            width: 24px;
            text-align: center;
        }

        .sidebar .logout-btn {
            margin-top: 24px;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #2a1f3a;
            color: #d4c8f0;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: center;
        }

        .sidebar .logout-btn:hover {
            background: #3d2d55;
        }

        /* ========== MAIN CONTENT ========== */
        .main {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
            height: 100vh;
        }

        .section {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #c4b0ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: #161222;
            border: 1px solid #2a2440;
            border-radius: 16px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .card h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #d4c8f0;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
            align-items: flex-end;
        }

        .form-row label {
            font-size: 13px;
            color: #a094c0;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1 0 160px;
        }

        .form-row input, .form-row select, .form-row textarea {
            background: #1e1a2e;
            border: 1px solid #2f2950;
            border-radius: 8px;
            padding: 8px 12px;
            color: #f0eef7;
            font-size: 14px;
            transition: border 0.2s;
            width: 100%;
        }

        .form-row input:focus, .form-row select:focus, .form-row textarea:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .form-row textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: #2d2550;
            color: #d4c8f0;
        }

        .btn:hover {
            background: #3d2d65;
            transform: scale(1.02);
        }

        .btn-primary {
            background: #7c5cf0;
            color: #fff;
        }

        .btn-primary:hover {
            background: #8b6cf5;
        }

        .btn-danger {
            background: #4a1f2f;
            color: #f0b0b0;
        }

        .btn-danger:hover {
            background: #6a2f3f;
        }

        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #3d3560;
        }

        .btn-outline:hover {
            background: #1e1a2e;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #1f1b2e;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item .info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .list-item .info .title {
            font-weight: 500;
            color: #e4daf5;
        }

        .list-item .info .sub {
            font-size: 13px;
            color: #8b7ab8;
        }

        .list-item .actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            color: #6b5a90;
            text-align: center;
            padding: 40px 0;
            font-size: 15px;
        }

        /* ========== AUTH ========== */
        #auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0b0a12;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .auth-box {
            background: #13101f;
            border: 1px solid #2a2440;
            border-radius: 24px;
            padding: 40px 48px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 24px 64px rgba(0,0,0,0.8);
        }

        .auth-box h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .auth-box .sub {
            color: #8b7ab8;
            margin-bottom: 24px;
        }

        .auth-box .form-group {
            margin-bottom: 16px;
        }

        .auth-box .form-group label {
            display: block;
            font-size: 13px;
            color: #a094c0;
            margin-bottom: 4px;
        }

        .auth-box .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #2f2950;
            background: #1e1a2e;
            color: #f0eef7;
            font-size: 15px;
        }

        .auth-box .form-group input:focus {
            border-color: #8b5cf6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .auth-box .btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 8px;
        }

        .auth-box .switch {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: #8b7ab8;
        }

        .auth-box .switch a {
            color: #a78bfa;
            cursor: pointer;
            text-decoration: none;
        }

        .auth-box .switch a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                flex-direction: row;
                flex-wrap: wrap;
                padding: 12px 16px;
                border-right: none;
                border-bottom: 1px solid #2a2440;
                position: sticky;
                top: 0;
                z-index: 10;
                background: #0b0a12;
            }
            .sidebar .logo {
                font-size: 22px;
                margin-bottom: 0;
                margin-right: 20px;
            }
            .sidebar .user-info {
                margin-bottom: 0;
                margin-right: auto;
                padding: 8px 12px;
            }
            .sidebar nav {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                flex: 1;
                margin-top: 8px;
            }
            .sidebar nav a {
                padding: 6px 12px;
                font-size: 13px;
            }
            .sidebar .logout-btn {
                margin-top: 0;
                padding: 6px 16px;
                font-size: 13px;
            }
            .main {
                padding: 20px;
                height: auto;
            }
            .auth-box {
                padding: 24px;
            }
            .form-row {
                flex-direction: column;
            }
            .form-row label {
                flex: 1;
            }
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0a12;
        }
        ::-webkit-scrollbar-thumb {
            background: #3d3560;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a4a80;
        }
    </style>
</head>
<body>

<!-- ==================== AUTH PAGE ==================== -->
<div id="auth-page">
    <div class="auth-box">
        <h1>GoTrip</h1>
        <div class="sub">Управляйте своими поездками</div>
        <form id="auth-form">
            <div id="auth-fields">
                <div class="form-group" id="register-email-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group" id="register-password-group">
                    <label>Пароль (мин. 8 символов)</label>
                    <input type="password" id="auth-password" placeholder="••••••••" required>
                </div>
                <div class="form-group hidden" id="register-fullname-group">
                    <label>Полное имя</label>
                    <input type="text" id="auth-fullname" placeholder="Иван Иванов">
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="auth-submit">Войти</button>
        </form>
        <div class="switch">
            <span id="auth-switch-text">Нет аккаунта?</span>
            <a id="auth-switch-link">Зарегистрироваться</a>
        </div>
        <div id="auth-error" style="color:#f0b0b0; margin-top:12px; font-size:14px; text-align:center;"></div>
    </div>
</div>

<!-- ==================== APP (after login) ==================== -->
<div id="app" class="hidden" style="display:flex; width:100%;">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">GoTrip</div>
        <div class="user-info" id="sidebar-user">
            <div class="email" id="sidebar-email">user@example.com</div>
            <div class="roles" id="sidebar-roles">USER</div>
        </div>
        <nav id="main-nav">
            <a data-section="profile" class="active"><span class="icon">👤</span> Профиль</a>
            <a data-section="notifications"><span class="icon">🔔</span> Уведомления</a>
            <a data-section="achievements"><span class="icon">🏆</span> Достижения</a>
            <a data-section="reviews"><span class="icon">⭐</span> Отзывы</a>
            <a data-section="locations"><span class="icon">📍</span> Локации</a>
            <a data-section="providers"><span class="icon">🏢</span> Провайдеры</a>
            <a data-section="services"><span class="icon">🛠️</span> Доп. услуги</a>
            <a data-section="admin" class="hidden" id="nav-admin"><span class="icon">⚙️</span> Админ-панель</a>
        </nav>
        <button class="logout-btn" id="logout-btn">Выйти</button>
    </aside>

    <!-- Main content -->
    <main class="main" id="main-content">
        <div id="section-container"></div>
    </main>
</div>

<script>
    // ============================================================
    //  STATE
    // ============================================================
    const state = {
        token: localStorage.getItem('access_token'),
        refreshToken: localStorage.getItem('refresh_token'),
        user: null,
        roles: [],
        currentSection: 'profile',
        editing: null,
    };

    // ============================================================
    //  API HELPERS
    // ============================================================
    const API_BASE = 'http://localhost:8080';

    async function apiFetch(path, opts = {}) {
        const url = API_BASE + path;
        const headers = {
            'Content-Type': 'application/json',
            ...(opts.headers || {})
        };
        if (state.token) {
            headers['Authorization'] = `Bearer ${state.token}`;
        }
        const resp = await fetch(url, {
            ...opts,
            headers,
        });
        if (resp.status === 401) {
            const refreshed = await refreshAccessToken();
            if (refreshed) {
                headers['Authorization'] = `Bearer ${state.token}`;
                const retry = await fetch(url, {
                    ...opts,
                    headers,
                });
                return retry;
            } else {
                logout();
                throw new Error('Сессия истекла, войдите заново.');
            }
        }
        return resp;
    }

    async function refreshAccessToken() {
        if (!state.refreshToken) return false;
        try {
            const resp = await fetch(API_BASE + '/auth/refresh', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refresh_token: state.refreshToken })
            });
            if (resp.ok) {
                const data = await resp.json();
                state.token = data.access_token;
                state.refreshToken = data.refresh_token;
                localStorage.setItem('access_token', state.token);
                localStorage.setItem('refresh_token', state.refreshToken);
                return true;
            }
        } catch (e) { /* ignore */ }
        return false;
    }

    function logout() {
        state.token = null;
        state.refreshToken = null;
        state.user = null;
        state.roles = [];
        localStorage.removeItem('access_token');
        localStorage.removeItem('refresh_token');
        document.getElementById('app').classList.add('hidden');
        document.getElementById('auth-page').style.display = 'flex';
        document.getElementById('auth-error').textContent = '';
        showAuthForm('login');
    }

    // ============================================================
    //  AUTH
    // ============================================================
    let authMode = 'login';

    function showAuthForm(mode) {
        authMode = mode;
        const submit = document.getElementById('auth-submit');
        const switchText = document.getElementById('auth-switch-text');
        const switchLink = document.getElementById('auth-switch-link');
        const fullnameGroup = document.getElementById('register-fullname-group');
        const emailGroup = document.getElementById('register-email-group');
        const passwordGroup = document.getElementById('register-password-group');

        if (mode === 'register') {
            submit.textContent = 'Зарегистрироваться';
            switchText.textContent = 'Уже есть аккаунт?';
            switchLink.textContent = 'Войти';
            fullnameGroup.classList.remove('hidden');
            emailGroup.querySelector('label').textContent = 'Email';
            passwordGroup.querySelector('label').textContent = 'Пароль (мин. 8)';
        } else {
            submit.textContent = 'Войти';
            switchText.textContent = 'Нет аккаунта?';
            switchLink.textContent = 'Зарегистрироваться';
            fullnameGroup.classList.add('hidden');
            emailGroup.querySelector('label').textContent = 'Email';
            passwordGroup.querySelector('label').textContent = 'Пароль';
        }
    }

    document.getElementById('auth-switch-link').addEventListener('click', (e) => {
        e.preventDefault();
        const newMode = authMode === 'login' ? 'register' : 'login';
        showAuthForm(newMode);
        document.getElementById('auth-error').textContent = '';
    });

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-password').value;
        const fullName = document.getElementById('auth-fullname').value;
        const errorEl = document.getElementById('auth-error');
        errorEl.textContent = '';

        try {
            let resp;
            if (authMode === 'register') {
                resp = await apiFetch('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, full_name: fullName || null })
                });
            } else {
                resp = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
            }
            if (!resp.ok) {
                const err = await resp.json();
                throw new Error(err.message || 'Ошибка авторизации');
            }
            const data = await resp.json();
            state.token = data.access_token;
            state.refreshToken = data.refresh_token;
            localStorage.setItem('access_token', state.token);
            localStorage.setItem('refresh_token', state.refreshToken);
            await loadUserProfile();
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            renderApp();
        } catch (err) {
            errorEl.textContent = err.message || 'Произошла ошибка';
        }
    });

    // ============================================================
    //  USER PROFILE
    // ============================================================
    async function loadUserProfile() {
        const resp = await apiFetch('/users/me');
        if (resp.ok) {
            const user = await resp.json();
            state.user = user;
            state.roles = user.roles || [];
            document.getElementById('sidebar-email').textContent = user.email;
            document.getElementById('sidebar-roles').textContent = state.roles.join(', ');
            if (state.roles.includes('ADMIN')) {
                document.getElementById('nav-admin').classList.remove('hidden');
            } else {
                document.getElementById('nav-admin').classList.add('hidden');
            }
            return user;
        }
        throw new Error('Не удалось загрузить профиль');
    }

    // ============================================================
    //  RENDER ENGINE
    // ============================================================
    function renderApp() {
        renderSection(state.currentSection);
        document.querySelectorAll('#main-nav a[data-section]').forEach(link => {
            link.addEventListener('click', () => {
                const section = link.dataset.section;
                state.currentSection = section;
                renderSection(section);
                document.querySelectorAll('#main-nav a[data-section]').forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            });
        });
        document.getElementById('logout-btn').addEventListener('click', logout);
    }

    function renderSection(section) {
        const container = document.getElementById('section-container');
        switch (section) {
            case 'profile': renderProfile(container); break;
            case 'notifications': renderNotifications(container); break;
            case 'achievements': renderAchievements(container); break;
            case 'reviews': renderReviews(container); break;
            case 'locations': renderLocations(container); break;
            case 'providers': renderProviders(container); break;
            case 'services': renderServices(container); break;
            case 'admin': renderAdmin(container); break;
            default: container.innerHTML = '<h2>Страница не найдена</h2>';
        }
    }

    // ============================================================
    //  PROFILE
    // ============================================================
    function renderProfile(container) {
        if (!state.user) {
            container.innerHTML = '<p>Загрузка...</p>';
            return;
        }
        const u = state.user;
        container.innerHTML = `
            <div class="section active">
                <h2>Профиль</h2>
                <div class="card">
                    <h3>Личные данные</h3>
                    <div class="form-row">
                        <label>Email <input type="email" id="profile-email" value="${u.email}" /></label>
                        <label>Полное имя <input type="text" id="profile-fullname" value="${u.full_name || ''}" /></label>
                    </div>
                    <button class="btn btn-primary" id="profile-update-btn">Обновить</button>
                </div>
                <div class="card">
                    <h3>Информация</h3>
                    <p><strong>ID:</strong> ${u.id}</p>
                    <p><strong>Роли:</strong> ${(u.roles || []).join(', ')}</p>
                    <p><strong>Дата регистрации:</strong> ${new Date(u.created_at).toLocaleString()}</p>
                </div>
            </div>
        `;
        document.getElementById('profile-update-btn').addEventListener('click', async () => {
            const email = document.getElementById('profile-email').value;
            const fullName = document.getElementById('profile-fullname').value;
            try {
                const resp = await apiFetch('/users/me', {
                    method: 'PATCH',
                    body: JSON.stringify({ email, full_name: fullName || null })
                });
                if (resp.ok) {
                    const updated = await resp.json();
                    state.user = updated;
                    state.roles = updated.roles || [];
                    document.getElementById('sidebar-email').textContent = updated.email;
                    document.getElementById('sidebar-roles').textContent = state.roles.join(', ');
                    renderProfile(container);
                    showToast('Профиль обновлён');
                } else {
                    const err = await resp.json();
                    showToast('Ошибка: ' + (err.message || 'Неизвестная ошибка'), 'error');
                }
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'error');
            }
        });
    }

    // ============================================================
    //  NOTIFICATIONS
    // ============================================================
    function renderNotifications(container) {
        container.innerHTML = `
            <div class="section active">
                <h2>Уведомления</h2>
                <div class="card">
                    <h3>Настройки уведомлений</h3>
                    <div class="form-row">
                        <label>
                            <input type="checkbox" id="notif-toggle" /> Получать уведомления
                        </label>
                        <button class="btn btn-primary" id="notif-save-btn">Сохранить</button>
                    </div>
                    <div id="notif-status"></div>
                </div>
                <div class="card">
                    <h3>История уведомлений</h3>
                    <div id="notif-list"></div>
                </div>
            </div>
        `;
        apiFetch('/notification-preferences').then(resp => resp.json()).then(pref => {
            if (pref && pref.is_enabled !== undefined) {
                document.getElementById('notif-toggle').checked = pref.is_enabled;
            }
        }).catch(() => {});

        document.getElementById('notif-save-btn').addEventListener('click', async () => {
            const enabled = document.getElementById('notif-toggle').checked;
            try {
                const resp = await apiFetch('/notification-preferences', {
                    method: 'PUT',
                    body: JSON.stringify({ is_enabled: enabled })
                });
                if (resp.ok) {
                    showToast('Настройки сохранены');
                } else {
                    const err = await resp.json();
                    showToast('Ошибка: ' + (err.message || ''), 'error');
                }
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'error');
            }

                    </div>
                    <div class="form-row">
                        <label>Оценка (1-5) <input type="number" id="review-rating" min="1" max="5" /></label>
                        <label>Текст <textarea id="review-text"></textarea></label>
                    </div>
                    <button class="btn btn-primary" id="review-create-btn">Оставить отзыв</button>
                </div>
                <div class="card">
                    <h3>Список отзывов</h3>
                    <div class="form-row">
                        <label>Тип цели <select id="review-filter-type">
                            <option value="">Все</option>
                            <option value="PROVIDER">Провайдер</option>
                            <option value="LOCATION">Локация</option>
                            <option value="ORDER">Заказ</option>
                            <option value="ADDITIONAL_SERVICE">Доп. услуга</option>
                        </select></label>
                        <label>ID цели <input type="number" id="review-filter-id" /></label>
                        <button class="btn" id="review-filter-btn">Поиск</button>
                    </div>
                    <div id="review-list"></div>
                </div>
            </div>
        `;
        document.getElementById('review-create-btn').addEventListener('click', async () => {
            const targetType = document.getElementById('review-target-type').value;
            const targetId = parseInt(document.getElementById('review-target-id').value);
            const rating = parseInt(document.getElementById('review-rating').value);
            const text = document.getElementById('review-text').value;
            if (!targetId || !rating) {
                showToast('Заполните все обязательные поля', 'error');
                return;
            }
            try {
                const resp = await apiFetch('/reviews', {
                    method: 'POST',
                    body: JSON.stringify({ target_type: targetType, target_id: targetId, rating, text })
                });
                if (resp.ok) {
                    showToast('Отзыв создан');
                    renderReviews(container);
                } else {
                    const err = await resp.json();
                    showToast('Ошибка: ' + (err.message || ''), 'error');
                }
            } catch (e) {
                showToast('Ошибка: ' + e.message, 'error');
            }
        });

        document.getElementById('review-filter-btn').addEventListener('click', () => {
            loadReviews();
        });
        loadReviews();

        async function loadReviews() {
            const targetType = document.getElementById('review-filter-type').value;
            const targetId = document.getElementById('review-filter-id').value;
            let url = '/reviews';
            const params = new URLSearchParams();
            if (targetType) params.append('targetType', targetType);
            if (targetId) params.append('targetId', targetId);
            if (params.toString()) url += '?' + params.toString();
            try {
                const resp = await apiFetch(url);
                if (resp.ok) {
                    const list = await resp.json();
                    const el = document.getElementById('review-list');
                    if (!list || list.length === 0) {
                        el.innerHTML = '<div class="empty-state">Нет отзывов</div>';
                        return;
                    }
                    el.innerHTML = list.map(r => `
                        <div class="list-item">
                            <div class="info">
                                <div class="title">⭐ ${r.rating}/5 — ${r.target_type} #${r.target_id}</div>
                                <div class="sub">${r.text || '(без текста)'} — от ${r.user_id}</div>
                            </div>
                            <div class="actions">
                                <button class="btn btn-sm btn-outline" onclick="editReview(${r.id})">✎</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteReview(${r.id})">✕</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                showToast('Ошибка загрузки отзывов', 'error');
            }
        }
        window.editReview = (id) => {
            apiFetch(`/reviews/${id}`).then(resp => resp.json()).then(review => {
                const newRating = prompt('Новая оценка (1-5):', review.rating);
                if (newRating === null) return;
                const newText = prompt('Новый текст:', review.text || '');
                if (newText === null) return;
                apiFetch(`/reviews/${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ rating: parseInt(newRating), text: newText })
                }).then(resp => {
                    if (resp.ok) { showToast('Отзыв обновлён'); loadReviews(); }
                    else showToast('Ошибка обновления', 'error');
                }).catch(() => showToast('Ошибка', 'error'));
            }).catch(() => showToast('Не удалось загрузить отзыв', 'error'));
        };
        window.deleteReview = async (id) => {
            if (!confirm('Удалить отзыв?')) return;
            try {
                const resp = await apiFetch(`/reviews/${id}`, { method: 'DELETE' });
                if (resp.ok) { showToast('Удалено'); loadReviews(); }
                else showToast('Ошибка удаления', 'error');
            } catch (e) {
                showToast('Ошибка', 'error');
            }
        };
    }

                    method: 'POST',
                    body: JSON.stringify({ code, title, description: description || null, conditionType, conditionValue, iconUrl: iconUrl || null })
                });
                if (resp.ok) { showToast('Достижение создано'); loadAdminAchievements(); }
                else { const err = await resp.json(); showToast('Ошибка: ' + err.message, 'error'); }
            } catch (e) { showToast('Ошибка: ' + e.message, 'error'); }
        });

        async function loadAdminAchievements() {
            try {
                const resp = await apiFetch('/achievements');
                if (resp.ok) {
                    const list = await resp.json();
                    const el = document.getElementById('adm-ach-list');
                    if (!list || list.length === 0) {
                        el.innerHTML = '<div class="empty-state">Нет достижений</div>';
                        return;
                    }
                    el.innerHTML = list.map(a => `
                        <div class="list-item">
                            <div class="info">
                                <div class="title">${a.title} (${a.code})</div>
                                <div class="sub">${a.description || ''}</div>
                            </div>
                            <div class="actions">
                                <button class="btn btn-sm btn-outline" onclick="adminEditAchievement(${a.id})">✎</button>
                                <button class="btn btn-sm btn-danger" onclick="adminDeleteAchievement(${a.id})">✕</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) { showToast('Ошибка загрузки', 'error'); }
        }

        window.adminEditAchievement = (id) => {
            apiFetch(`/achievements`).then(resp => resp.json()).then(list => {
                const a = list.find(x => x.id === id);
                if (!a) return;
                const code = prompt('Код:', a.code);
                if (code === null) return;
                const title = prompt('Название:', a.title);
                if (title === null) return;
                const desc = prompt('Описание:', a.description || '');
                const condType = prompt('Тип условия:', a.condition_type);
                const condValue = prompt('Значение:', a.condition_value);
                if (condValue === null) return;
                apiFetch(`/admin/achievements/${id}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ code, title, description: desc || null, conditionType: condType, conditionValue: parseInt(condValue) })
                }).then(resp => {
                    if (resp.ok) { showToast('Достижение обновлено'); loadAdminAchievements(); }
                    else showToast('Ошибка', 'error');
                });
            }).catch(() => showToast('Ошибка', 'error'));
        };
        window.adminDeleteAchievement = async (id) => {
            if (!confirm('Удалить достижение?')) return;
            try {
                const resp = await apiFetch(`/admin/achievements/${id}`, { method: 'DELETE' });
                if (resp.ok) { showToast('Удалено'); loadAdminAchievements(); }
                else showToast('Ошибка', 'error');
            } catch (e) { showToast('Ошибка', 'error');
            }
        };
    }

    // ============================================================
    //  TOAST NOTIFICATIONS
    // ============================================================
    function showToast(msg, type = 'success') {
        const existing = document.querySelector('.toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.cssText = `
            position: fixed; bottom: 24px; right: 24px; padding: 14px 24px;
            background: ${type === 'error' ? '#3d1f2a' : '#1f2a3d'};
            border: 1px solid ${type === 'error' ? '#6a3f4f' : '#2f4a6a'};
            border-radius: 12px; color: #f0eef7; font-size: 15px;
            z-index: 9999; max-width: 400px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            animation: fadeIn 0.2s ease;
        `;
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    // ============================================================
    //  INIT
    // ============================================================
    document.addEventListener('DOMContentLoaded', async () => {
        if (state.token) {
            try {
                await loadUserProfile();
                document.getElementById('auth-page').style.display = 'none';
                document.getElementById('app').classList.remove('hidden');
                renderApp();
            } catch (e) {
                logout();
            }
        } else {
            document.getElementById('auth-page').style.display = 'flex';
        }
    });
</script>
</body>
</html>
