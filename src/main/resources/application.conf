gotrip {
  server {
    host = "0.0.0.0"
    host = ${?GOTRIP_SERVER_HOST}
    port = 8080
    port = ${?GOTRIP_SERVER_PORT}
  }

  auth {
    issuer = "gotrip"
    jwt-secret = "dev-only-change-me"
    access-token-ttl = 15 minutes
    refresh-token-ttl = 30 days
    password-cost = 12
  }

  database {
    url = "jdbc:postgresql://localhost:5432/gotrip"
    url = ${?GOTRIP_DB_URL}
    host = "localhost"
    host = ${?GOTRIP_DB_HOST}
    port = 5432
    port = ${?GOTRIP_DB_PORT}
    database = "gotrip"
    database = ${?GOTRIP_DB_NAME}
    user = "gotrip_user"
    user = ${?GOTRIP_DB_USER}
    password = ${GOTRIP_DB_PASSWORD}
    driver = "org.postgresql.Driver"
    connection-pool {
      max-size = 10
      max-size = ${?GOTRIP_DB_POOL_MAX_SIZE}
      minimum-idle = 2
      minimum-idle = ${?GOTRIP_DB_POOL_MIN_IDLE}
    }
  }

  duffel {
    base-url = "https://api.duffel.com"
    base-url = ${?DUFFEL_BASE_URL}
    access-token = ${DUFFEL_ACCESS_TOKEN}
    version = "v2"
    version = ${?DUFFEL_VERSION}
  }
}
