gotrip {
  server {
    host = "0.0.0.0"
    port = 8080
  }

  auth {
    issuer = "gotrip"
    jwt-secret = "dev-only-change-me"
    access-token-ttl = 15 minutes
    refresh-token-ttl = 30 days
    password-cost = 12
  }

  database {
    url = "jdbc:postgresql://localhost:5432/gotrip"
    host = "localhost"
    port = 5432
    database = "gotrip"
    user = "gotrip_user"
    password = "secret"
    driver = "org.postgresql.Driver"
    connection-pool {
      max-size = 10
      minimum-idle = 2
    }
  }
}
