paths:
  "/achievements":
    get:
      tags:
      - Achievements
      summary: List achievements
      operationId: listAchievements
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/Achievement"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
  "/users/me/achievements":
    get:
      tags:
      - Achievements
      summary: List current user's achievements
      operationId: listMyAchievements
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/UserAchievement"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
