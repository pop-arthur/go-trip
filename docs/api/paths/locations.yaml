paths:
  "/locations":
    get:
      tags:
      - Locations
      summary: Search locations
      operationId: listLocations
      parameters:
      - name: type
        in: query
        schema:
          "$ref": "../gotrip-openapi.yaml#/components/schemas/LocationType"
        required: false
      - name: country
        in: query
        schema:
          type: string
        required: false
      - name: city
        in: query
        schema:
          type: string
        required: false
      - name: query
        in: query
        schema:
          type: string
        required: false
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/Location"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
    post:
      tags:
      - Locations
      summary: Create custom location
      operationId: createLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/LocationCreateRequest"
      responses:
        '201':
          description: Location created
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Location"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
  "/locations/{locationId}":
    get:
      tags:
      - Locations
      summary: Get location by ID
      operationId: getLocation
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/LocationId"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Location"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
    patch:
      tags:
      - Locations
      summary: Update location
      operationId: updateLocation
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/LocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/LocationUpdateRequest"
      responses:
        '200':
          description: Location updated
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Location"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
    delete:
      tags:
      - Locations
      summary: Delete custom location
      operationId: deleteLocation
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/LocationId"
      responses:
        '204':
          description: Location deleted
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '409':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Conflict"
