paths:
  "/admin/orders/{orderId}/simulate-status-change":
    post:
      tags:
      - Admin
      summary: Simulate order status change
      operationId: simulateOrderStatusChange
      description: Admin-only endpoint for testing status changes and notification flow. It updates the current order status.
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/AdminSimulateStatusChangeRequest"
      responses:
        '200':
          description: Order status simulated
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Order"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
