paths:
  "/orders/{orderId}/files":
    get:
      tags:
      - Order Files
      summary: List order files
      operationId: listOrderFiles
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/OrderId"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/OrderFile"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
    post:
      tags:
      - Order Files
      summary: Upload order file
      operationId: uploadOrderFile
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/OrderId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - file
              properties:
                file:
                  type: string
                  format: binary
                file_type:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/FileType"
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/OrderFileUploadResponse"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
  "/orders/{orderId}/files/{fileId}":
    get:
      tags:
      - Order Files
      summary: Download order file
      operationId: downloadOrderFile
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/OrderId"
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/FileId"
      responses:
        '200':
          description: Binary file content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
    delete:
      tags:
      - Order Files
      summary: Delete order file
      operationId: deleteOrderFile
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/OrderId"
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/FileId"
      responses:
        '204':
          description: File deleted
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
