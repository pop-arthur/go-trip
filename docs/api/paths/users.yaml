paths:
  "/users/me":
    get:
      tags:
      - Users
      summary: Get current user profile
      operationId: getCurrentUser
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/User"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
    patch:
      tags:
      - Users
      summary: Update current user profile
      operationId: updateCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/UserUpdateRequest"
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/User"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '409':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Conflict"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
