paths:
  "/providers":
    get:
      tags:
      - Providers
      summary: List providers
      operationId: listProviders
      parameters:
      - name: type
        in: query
        schema:
          "$ref": "../gotrip-openapi.yaml#/components/schemas/ProviderType"
      - name: query
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/Provider"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
    post:
      tags:
      - Providers
      summary: Create custom provider
      operationId: createProvider
      description: Creates a provider that can be used in the current user's orders and additional services.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/ProviderCreateRequest"
      responses:
        '201':
          description: Provider created
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Provider"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '409':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Conflict"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
  "/providers/{providerId}":
    get:
      tags:
      - Providers
      summary: Get provider by ID
      operationId: getProvider
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/ProviderId"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Provider"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
    delete:
      tags:
      - Providers
      summary: Delete custom provider
      operationId: deleteCustomProvider
      description: Deletes a provider created by the current user. Built-in, global, admin-created, or other users' providers cannot be deleted through this endpoint.
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/ProviderId"
      responses:
        '204':
          description: Custom provider deleted
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '409':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Conflict"
