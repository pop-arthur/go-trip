paths:
  "/notification-preferences":
    get:
      tags:
      - Notifications
      summary: Get notification preferences
      operationId: getNotificationPreferences
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/NotificationPreference"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
    put:
      tags:
      - Notifications
      summary: Replace notification preferences
      operationId: replaceNotificationPreferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/NotificationPreferencesUpdateRequest"
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/NotificationPreference"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
  "/notification-preferences/{preferenceId}":
    patch:
      tags:
      - Notifications
      summary: Update one notification preference
      operationId: updateNotificationPreference
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/PreferenceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/NotificationPreferencePatchRequest"
      responses:
        '200':
          description: Preference updated
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/NotificationPreference"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
