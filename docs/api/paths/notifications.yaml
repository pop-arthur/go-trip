paths:
  "/notification-preferences":
    get:
      tags:
      - Notifications
      summary: Get notification preference
      operationId: getNotificationPreference
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/NotificationPreference"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
    put:
      tags:
      - Notifications
      summary: Update notification preference
      operationId: updateNotificationPreference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/NotificationPreferenceUpdateRequest"
      responses:
        '200':
          description: Preference updated
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/NotificationPreference"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
