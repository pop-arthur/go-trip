paths:
  "/reviews":
    get:
      tags:
      - Reviews
      summary: List reviews
      operationId: listReviews
      parameters:
      - name: targetType
        in: query
        schema:
          "$ref": "../gotrip-openapi.yaml#/components/schemas/ReviewTargetType"
      - name: targetId
        in: query
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/Review"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
    post:
      tags:
      - Reviews
      summary: Create review
      operationId: createReview
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/ReviewCreateRequest"
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Review"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '409':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Conflict"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
  "/reviews/{reviewId}":
    get:
      tags:
      - Reviews
      summary: Get review by ID
      operationId: getReview
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/ReviewId"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Review"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
    patch:
      tags:
      - Reviews
      summary: Update review
      operationId: updateReview
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/ReviewId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/ReviewUpdateRequest"
      responses:
        '200':
          description: Review updated
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Review"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
    delete:
      tags:
      - Reviews
      summary: Delete review
      operationId: deleteReview
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/ReviewId"
      responses:
        '204':
          description: Review deleted
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
