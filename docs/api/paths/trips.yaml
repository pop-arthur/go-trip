paths:
  "/trips":
    get:
      tags:
      - Trips
      summary: List current user's trips
      operationId: listTrips
      parameters:
      - name: status
        in: query
        schema:
          "$ref": "../gotrip-openapi.yaml#/components/schemas/TripStatus"
        required: false
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/FromDate"
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/ToDate"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/Trip"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
    post:
      tags:
      - Trips
      summary: Create a trip
      operationId: createTrip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/TripCreateRequest"
      responses:
        '201':
          description: Trip created
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Trip"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
  "/trips/{tripId}":
    get:
      tags:
      - Trips
      summary: Get trip by ID
      operationId: getTrip
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripId"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Trip"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
    patch:
      tags:
      - Trips
      summary: Update trip
      operationId: updateTrip
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/TripUpdateRequest"
      responses:
        '200':
          description: Trip updated
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/Trip"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
    delete:
      tags:
      - Trips
      summary: Delete trip
      operationId: deleteTrip
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripId"
      responses:
        '204':
          description: Trip deleted
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '409':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Conflict"
