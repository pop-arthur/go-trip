paths:
  "/trips/{tripId}/locations":
    get:
      tags:
      - Trip Locations
      summary: Get trip route
      operationId: listTripLocations
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripId"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/TripLocation"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
    post:
      tags:
      - Trip Locations
      summary: Add location to trip route
      operationId: addTripLocation
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/TripLocationCreateRequest"
      responses:
        '201':
          description: Location added to route
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/TripLocation"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
  "/trips/{tripId}/locations/{tripLocationId}":
    patch:
      tags:
      - Trip Locations
      summary: Update trip route item
      operationId: updateTripLocation
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripId"
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripLocationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              "$ref": "../gotrip-openapi.yaml#/components/schemas/TripLocationUpdateRequest"
      responses:
        '200':
          description: Route item updated
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/TripLocation"
        '400':
          "$ref": "../gotrip-openapi.yaml#/components/responses/BadRequest"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
        '422':
          "$ref": "../gotrip-openapi.yaml#/components/responses/ValidationError"
    delete:
      tags:
      - Trip Locations
      summary: Remove location from trip route
      operationId: deleteTripLocation
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripId"
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripLocationId"
      responses:
        '204':
          description: Location removed from route
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
