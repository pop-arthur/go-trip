paths:
  "/trips/{tripId}/recommendations":
    get:
      tags:
      - Recommendations
      summary: Get recommendations for trip
      operationId: getTripRecommendations
      description: Returns dynamic recommendations based on trip data and additional services catalog. No stored recommendation rules resource is used.
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/TripId"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/Recommendation"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
  "/orders/{orderId}/recommendations":
    get:
      tags:
      - Recommendations
      summary: Get recommendations for order
      operationId: getOrderRecommendations
      description: Returns dynamic recommendations based on order data and additional services catalog. No stored recommendation rules resource is used.
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/OrderId"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "../gotrip-openapi.yaml#/components/schemas/Recommendation"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
        '403':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Forbidden"
        '404':
          "$ref": "../gotrip-openapi.yaml#/components/responses/NotFound"
