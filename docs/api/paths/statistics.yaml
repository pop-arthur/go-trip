paths:
  "/statistics/countries":
    get:
      tags:
      - Statistics
      summary: Get visited countries statistics
      operationId: getCountriesStatistics
      parameters:
      - name: period
        in: query
        schema:
          type: string
          enum:
          - WEEK
          - MONTH
          - YEAR
          - ALL_TIME
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/FromDate"
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/ToDate"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/CountriesStatisticsResponse"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
  "/statistics/spending":
    get:
      tags:
      - Statistics
      summary: Get spending statistics
      operationId: getSpendingStatistics
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/FromDate"
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/ToDate"
      - name: currency
        in: query
        schema:
          type: string
          example: USD
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/SpendingStatisticsResponse"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
  "/statistics/upcoming-trips":
    get:
      tags:
      - Statistics
      summary: Get upcoming trips statistics
      operationId: getUpcomingTripsStatistics
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/UpcomingTripsResponse"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
  "/statistics/trip-durations":
    get:
      tags:
      - Statistics
      summary: Get trip durations statistics
      operationId: getTripDurationsStatistics
      parameters:
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/FromDate"
      - "$ref": "../gotrip-openapi.yaml#/components/parameters/ToDate"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                "$ref": "../gotrip-openapi.yaml#/components/schemas/TripDurationsResponse"
        '401':
          "$ref": "../gotrip-openapi.yaml#/components/responses/Unauthorized"
