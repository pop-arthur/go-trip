<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTrip — управление поездками</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ==================== AUTH PAGE ==================== -->
<div id="auth-page">
    <div class="auth-box">
        <h1>GoTrip</h1>
        <div class="sub">Управляйте своими поездками</div>
        <form id="auth-form">
            <div id="auth-fields">
                <div class="form-group" id="register-email-group">
                    <label>Email</label>
                    <input type="email" id="auth-email" placeholder="you@example.com" required>
                </div>
                <div class="form-group" id="register-password-group">
                    <label>Пароль (мин. 8 символов)</label>
                    <input type="password" id="auth-password" placeholder="••••••••" required>
                </div>
                <div class="form-group hidden" id="register-fullname-group">
                    <label>Полное имя</label>
                    <input type="text" id="auth-fullname" placeholder="Иван Иванов">
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="auth-submit">Войти</button>
        </form>
        <div class="switch">
            <span id="auth-switch-text">Нет аккаунта?</span>
            <a id="auth-switch-link">Зарегистрироваться</a>
        </div>
        <div id="auth-error" style="color:#f0b0b0; margin-top:12px; font-size:14px; text-align:center;"></div>
    </div>
</div>

<!-- ==================== APP (after login) ==================== -->
<div id="app" class="hidden" style="display:flex; width:100%;">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="logo">GoTrip</div>
        <div class="user-info" id="sidebar-user">
            <div class="email" id="sidebar-email">user@example.com</div>
            <div class="roles" id="sidebar-roles">USER</div>
        </div>
        <nav id="main-nav">
            <a data-section="profile" class="active"><span class="icon">👤</span> Профиль</a>
            <a data-section="notifications"><span class="icon">🔔</span> Уведомления</a>
            <a data-section="achievements"><span class="icon">🏆</span> Достижения</a>
            <a data-section="reviews"><span class="icon">⭐</span> Отзывы</a>
            <a data-section="locations"><span class="icon">📍</span> Локации</a>
            <a data-section="providers"><span class="icon">🏢</span> Провайдеры</a>
            <a data-section="services"><span class="icon">🛠️</span> Доп. услуги</a>
            <a data-section="trips"><span class="icon">✈️</span> Поездки</a>
            <a data-section="admin" class="hidden" id="nav-admin"><span class="icon">⚙️</span> Админ-панель</a>
        </nav>
        <button class="logout-btn" id="logout-btn">Выйти</button>
    </aside>

    <!-- Main content -->
    <main class="main" id="main-content">
        <div id="section-container"></div>
    </main>
</div>

<script src="app.js"></script>
</body>
</html>
